cli:
  backend: claude
event_loop:
  prompt_file: PROMPT.md
  completion_promise: LOOP_COMPLETE
  max_iterations: 100
hats:
  builder:
    name: Builder
    triggers:
      - feature.requested
      - review.changes_requested
    publishes:
      - review.request 
      - build.blocked
    description: |
      Act as the core developer. Write the code to implement the requested feature or address requested review changes.
      - If you encounter missing dependencies or lack sufficient information, emit the `build.blocked` event.
      - Once the feature is successfully built or the changes are implemented, emit the `review.request` event to pass the work to the Reviewer.
  adviser:
    name: Adviser
    triggers:
      - advice.requested
      - build.blocked
    publishes:
      - review.request
    description: |
      Act as the technical lead and problem solver. 
      Analyze strategic inquiries or unblock the Builder when a `build.blocked` event occurs. 
      Formulate a detailed solution, decision, or architectural plan. 
      Once the advice is fully documented, emit the `review.request` event to have the proposal validated.
  diagnoser:
    name: Diagnoser
    triggers:
      - bugfix.requested
    publishes:
      - review.request
    description: |
      Act as the debugging specialist. 
      Investigate the root cause of the reported issue, analyze logs or code paths, and implement a precise fix. 
      Once the bug is resolved and tested, emit the `review.request` event to send the patch for final approval.
  reviewer:
    name: Reviewer
    triggers:
      - review.request
    publishes:
      - review.approved
      - review.changes_requested
    description: |
      Act as the quality assurance gatekeeper. 
      Critically evaluate the code, bugfix, or advice submitted via the `review.request` event.
      - If the work meets all quality standards and requirements, emit the `review.approved` event.
      - If the work contains errors, regressions, or misses the objective, detail the required fixes and emit the `review.changes_requested` event.
robot:
  enabled: true
  timeout_seconds: 120
